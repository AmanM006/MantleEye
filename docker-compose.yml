services:
  # ===== Infrastructure =====
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mantleye}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mantleye_pass}
      POSTGRES_DB: ${POSTGRES_DB:-mantleye}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mantleye}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mantleye-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mantleye-net

  # ===== Backend Services =====
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mantleye}:${POSTGRES_PASSWORD:-mantleye_pass}@postgres:5432/${POSTGRES_DB:-mantleye}
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - mantleye-net

  data-ingestion:
    build:
      context: ./services/data-ingestion
      dockerfile: Dockerfile
    environment:
      MANTLE_RPC_URL: ${MANTLE_RPC_URL:-https://rpc.sepolia.mantle.xyz}
      DATABASE_URL: postgresql://${POSTGRES_USER:-mantleye}:${POSTGRES_PASSWORD:-mantleye_pass}@postgres:5432/${POSTGRES_DB:-mantleye}
      REDIS_URL: redis://redis:6379
      BYBIT_WS_URL: ${BYBIT_WS_URL:-wss://stream.bybit.com/v5/public/spot}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mantleye-net

  signal-engine:
    build:
      context: ./services/signal-engine
      dockerfile: Dockerfile
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER:-mantleye}:${POSTGRES_PASSWORD:-mantleye_pass}@postgres:5432/${POSTGRES_DB:-mantleye}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mantleye-net

  strategy-engine:
    build:
      context: ./services/strategy-engine
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mantleye}:${POSTGRES_PASSWORD:-mantleye_pass}@postgres:5432/${POSTGRES_DB:-mantleye}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mantleye-net

  executor:
    build:
      context: ./services/executor
      dockerfile: Dockerfile
    environment:
      BYBIT_API_KEY: ${BYBIT_API_KEY}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET}
      BYBIT_TESTNET: ${BYBIT_TESTNET:-true}
      MANTLE_RPC_URL: ${MANTLE_RPC_URL:-https://rpc.sepolia.mantle.xyz}
      MANTLE_PRIVATE_KEY: ${MANTLE_PRIVATE_KEY}
      TRADE_LOGGER_ADDRESS: ${TRADE_LOGGER_ADDRESS}
      SIGNAL_ANCHOR_ADDRESS: ${SIGNAL_ANCHOR_ADDRESS}
      DATABASE_URL: postgresql://${POSTGRES_USER:-mantleye}:${POSTGRES_PASSWORD:-mantleye_pass}@postgres:5432/${POSTGRES_DB:-mantleye}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mantleye-net

  alert-bot:
    build:
      context: ./services/alert-bot
      dockerfile: Dockerfile
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mantleye-net

  # ===== Frontend =====
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
      NEXT_PUBLIC_WS_URL: ws://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mantleye-net

networks:
  mantleye-net:
    driver: bridge

volumes:
  pgdata:
