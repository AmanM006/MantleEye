version: '3.8'

services:
  # ===== Infrastructure =====
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mantleye}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mantleye_pass}
      POSTGRES_DB: ${POSTGRES_DB:-mantleye}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mantleye}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mantleye-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mantleye-net

  # ===== MantleEye Python Agent =====
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    environment:
      MANTLE_RPC_URL: ${MANTLE_RPC_URL}
      MANTLE_PRIVATE_KEY: ${MANTLE_PRIVATE_KEY}
      TRADE_LOGGER_ADDRESS: ${TRADE_LOGGER_ADDRESS}
      SIGNAL_ANCHOR_ADDRESS: ${SIGNAL_ANCHOR_ADDRESS}
      AGENT_REGISTRY_ADDRESS: ${AGENT_REGISTRY_ADDRESS}
      BYBIT_API_KEY: ${BYBIT_API_KEY}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET}
      BYBIT_TESTNET: ${BYBIT_TESTNET:-true}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      DATABASE_URL: postgresql://${POSTGRES_USER:-mantleye}:${POSTGRES_PASSWORD:-mantleye_pass}@postgres:5432/${POSTGRES_DB:-mantleye}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mantleye-net

  # ===== Next.js Web Dashboard =====
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      NEXT_PUBLIC_API_URL: http://localhost:3000
    depends_on:
      - agent
    restart: unless-stopped
    networks:
      - mantleye-net

networks:
  mantleye-net:
    driver: bridge

volumes:
  pgdata:
